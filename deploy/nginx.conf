server {
    listen 443 ssl http2;
    server_name bench.jonathanwrede.de;

    ssl_certificate /etc/letsencrypt/live/bench.jonathanwrede.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bench.jonathanwrede.de/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:7682;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name bench.jonathanwrede.de;
    return 301 https://$server_name$request_uri;
}
